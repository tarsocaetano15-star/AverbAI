<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Monitor de Navios</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="toasts"></div>

<div class="wrapper">

<h1>🚢 Monitor de Navios</h1>

<div class="card">
<input type="text" id="ship-name" placeholder="Nome do navio">
<input type="text" id="ship-port" placeholder="Porto">
<input type="text" id="ship-obs" placeholder="Observação">

<button onclick="addShip()">+ Adicionar Navio</button>

<h3>📍 Em Monitoramento</h3>
<div id="ships-list"></div>

<h3>✅ Concluídos</h3>
<div id="ships-done"></div>
</div>

<div class="card">
<h3>🔁 Frequência</h3>

<select id="freq-select" onchange="setFrequency(this.value)">
<option value="1">1 min</option>
<option value="10">10 min</option>
<option value="15">15 min</option>
<option value="30">30 min</option>
<option value="60">1 hora</option>
<option value="360">6 horas</option>
<option value="720">12 horas</option>
<option value="1440">1x ao dia</option>
</select>

</div>

<div class="card">
<button onclick="startMonitor()">▶ Iniciar Monitoramento</button>
<button onclick="stopMonitor()">⏹ Parar</button>
</div>

<div class="card">
<h3>📜 Histórico</h3>
<button onclick="clearLogs()">🧹 Limpar histórico</button>
<div id="log"></div>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
