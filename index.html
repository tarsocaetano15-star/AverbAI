<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Monitor de Navios</title>

<link rel="stylesheet" href="style.css">

<style>
.grid-3 {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 16px;
}

@media (max-width: 900px){
  .grid-3 {
    grid-template-columns: 1fr;
  }
}
</style>

</head>

<body>

<div id="toasts"></div>

<div class="wrapper">

<h1>🚢 Monitor de Navios</h1>

<!-- GRID PRINCIPAL -->
<div class="grid-3">

  <!-- FUTUROS -->
  <div class="card">
    <h3>📅 Futuros Monitoramentos</h3>

    <input type="text" id="future-name" placeholder="Nome do navio">
    <input type="text" id="future-port" placeholder="Porto">
    <input type="text" id="future-obs" placeholder="Observação">
    <input type="date" id="future-date">

    <button onclick="addFutureShip()">+ Agendar</button>

    <div id="future-list"></div>
  </div>

  <!-- ATIVOS -->
  <div class="card">
    <h3>📍 Em Monitoramento</h3>

    <input type="text" id="ship-name" placeholder="Nome do navio">
    <input type="text" id="ship-port" placeholder="Porto">
    <input type="text" id="ship-obs" placeholder="Observação">

    <button onclick="addShip()">+ Adicionar Navio</button>

    <div id="ships-list"></div>
  </div>

  <!-- CONCLUÍDOS -->
  <div class="card">
    <h3>✅ Concluídos</h3>
    <div id="ships-done"></div>
  </div>

</div>

<!-- FREQUÊNCIA -->
<div class="card">
  <h3>🔁 Frequência</h3>

  <select id="freq-select" onchange="setFrequency(this.value)">
    <option value="1">1 min</option>
    <option value="10">10 min</option>
    <option value="15">15 min</option>
    <option value="30">30 min</option>
    <option value="60">1 hora</option>
    <option value="360">6 horas</option>
    <option value="720">12 horas</option>
    <option value="1440">1x ao dia</option>
  </select>
</div>

<!-- HORÁRIO FIXO -->
<div class="card">
  <h3>⏰ Horário fixo</h3>

  <input type="time" id="fixed-time" value="09:00">

  <small style="color:gray">
    O alerta também será disparado neste horário todos os dias
  </small>
</div>

<!-- MONITOR -->
<div class="card">
  <button onclick="startMonitor()">▶ Iniciar Monitoramento</button>
  <button onclick="stopMonitor()">⏹ Parar</button>
</div>

<!-- LOG -->
<div class="card">
  <h3>📜 Histórico</h3>
  <button onclick="clearLogs()">🧹 Limpar histórico</button>
  <div id="log"></div>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
