<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Monitor de Navios</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

<style>
:root{
  --bg:#0a0f1e;
  --card:#111827;
  --border:rgba(255,255,255,0.08);
  --accent:#00d4ff;
  --green:#10b981;
  --yellow:#f59e0b;
  --red:#ef4444;
  --text:#e2e8f0;
  --muted:#64748b;
}

body{
  margin:0;
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
}

.wrapper{
  max-width:1400px;
  margin:auto;
  padding:30px;
}

.dashboard{
  display:flex;
  gap:20px;
  margin-bottom:20px;
}

.dash-box{
  flex:1;
  background:var(--card);
  padding:15px;
  border-radius:12px;
  border:1px solid var(--border);
  text-align:center;
}

.grid{
  display:grid;
  grid-template-columns: 1fr 1.3fr 1fr;
  gap:20px;
}

.card{
  background:var(--card);
  border-radius:16px;
  padding:20px;
  border:1px solid var(--border);
}

.card.center{
  transform:scale(1.02);
  border:1px solid var(--accent);
}

.ship{
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  background:#1a2236;
  position:relative;
}

.ship-actions{
  position:absolute;
  right:10px;
  top:10px;
  opacity:0;
}

.ship:hover .ship-actions{
  opacity:1;
}

input,select,button{
  width:100%;
  margin-top:6px;
  padding:8px;
  border-radius:8px;
  border:none;
}

button{
  background:var(--accent);
  font-weight:bold;
  cursor:pointer;
}

#toast-container{
  position:fixed;
  bottom:20px;
  right:20px;
  z-index:9999;
}

.toast{
  background:#1e293b;
  color:white;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
}

/* HISTÓRICO */
#historico{
  margin-top:15px;
  max-height:200px;
  overflow:auto;
  background:#0f172a;
  border:1px solid var(--border);
  border-radius:10px;
  padding:10px;
}
</style>
</head>

<body>

<div id="toast-container"></div>

<div class="wrapper">

<h1>🚢 Monitor de Navios</h1>

<div class="dashboard">
  <div class="dash-box" id="dash-active">Ativos: 0</div>
  <div class="dash-box" id="dash-future">Futuros: 0</div>
  <div class="dash-box" id="dash-done">Concluídos: 0</div>
</div>

<div class="grid">

<div class="card">
<h3>📅 Futuros</h3>
<input id="future-name" placeholder="Nome">
<input id="future-port" placeholder="Porto">
<input id="future-obs" placeholder="Obs">
<input type="date" id="future-date">
<button onclick="addFutureShip()">Agendar</button>
<div id="future-list"></div>
</div>

<div class="card center">
<h3>📍 Monitorando</h3>
<input id="ship-name" placeholder="Nome">
<input id="ship-port" placeholder="Porto">
<input id="ship-obs" placeholder="Obs">
<button onclick="addShip()">Adicionar</button>
<div id="ships-list"></div>
</div>

<div class="card">
<h3>✅ Concluídos</h3>
<div id="ships-done"></div>
</div>

</div>

<!-- HISTÓRICO (ADICIONADO SEM ALTERAR NADA) -->
<div class="card">
  <h3>📜 Histórico</h3>
  <div id="historico"></div>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
