<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Monitor de Navios</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

<style>
:root{
  --bg:#0a0f1e;
  --card:#111827;
  --border:rgba(255,255,255,0.08);
  --accent:#00d4ff;
  --green:#10b981;
  --yellow:#f59e0b;
  --red:#ef4444;
  --text:#e2e8f0;
  --muted:#64748b;
}

body{
  margin:0;
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
}

.wrapper{
  max-width:1400px;
  margin:auto;
  padding:30px;
}

/* DASHBOARD */
.dashboard{
  display:flex;
  gap:20px;
  margin-bottom:20px;
}

.dash-box{
  flex:1;
  background:var(--card);
  padding:15px;
  border-radius:12px;
  border:1px solid var(--border);
  text-align:center;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns: 1fr 1.3fr 1fr;
  gap:20px;
}

/* CARDS */
.card{
  background:var(--card);
  border-radius:16px;
  padding:20px;
  border:1px solid var(--border);
}

/* NAVIOS */
.ship{
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  background:#1a2236;
  position:relative;
}

.ship-actions{
  position:absolute;
  right:10px;
  top:10px;
}

input,button,select{
  width:100%;
  margin-top:6px;
  padding:8px;
  border-radius:8px;
  border:none;
}

button{
  background:var(--accent);
  font-weight:bold;
  cursor:pointer;
}

/* SCROLL CONCLUÍDOS */
#ships-done{
  max-height:300px;
  overflow-y:auto;
}

/* TOAST */
#toast-container{
  position:fixed;
  bottom:20px;
  right:20px;
  z-index:9999;
}
</style>
</head>

<body>

<div id="toast-container"></div>

<div class="wrapper">

<h1>🚢 Monitor de Navios</h1>

<!-- DASHBOARD -->
<div class="dashboard">
  <div class="dash-box" id="dash-active">Ativos: 0</div>
  <div class="dash-box" id="dash-future">Futuros: 0</div>
  <div class="dash-box" id="dash-done">Concluídos: 0</div>
</div>

<div class="grid">

<!-- FUTUROS -->
<div class="card">
<h3>📅 Futuros</h3>

<input id="future-name" placeholder="Nome">
<input id="future-port" placeholder="Porto">
<input id="future-obs" placeholder="Obs">
<input type="date" id="future-date">

<button onclick="addFutureShip()">Agendar</button>

<div id="future-list"></div>
</div>

<!-- ATIVOS -->
<div class="card">
<h3>📍 Monitorando</h3>

<input id="ship-name" placeholder="Nome">
<input id="ship-port" placeholder="Porto">
<input id="ship-obs" placeholder="Obs">

<button onclick="addShip()">Adicionar</button>

<div id="ships-list"></div>
</div>

<!-- CONCLUÍDOS -->
<div class="card">
<h3>✅ Concluídos</h3>
<div id="ships-done"></div>
</div>

</div>

<br>

<!-- CONTROLE -->
<div class="card">

<select onchange="freq=this.value">
<option value="1">1 min</option>
<option value="10">10 min</option>
<option value="15">15 min</option>
<option value="30">30 min</option>
<option value="60">1 hora</option>
<option value="360">6 horas</option>
<option value="720">12 horas</option>
<option value="1440" selected>1x ao dia</option>
</select>

<input type="time" id="fixed-time" value="09:00">

<button onclick="startMonitor()">▶ Iniciar Monitoramento</button>
<button onclick="stopMonitor()">⏹ Parar Monitoramento</button>

</div>

</div>

<script src="script.js"></script>
</body>
</html>
