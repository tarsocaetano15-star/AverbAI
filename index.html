<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Monitor de Navios</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="toasts"></div>

<div class="wrapper">

<h1>🚢 Monitor de Navios</h1>

<div class="card">
<input type="text" id="ship-name" placeholder="Nome do navio">
<input type="text" id="ship-port" placeholder="Porto">
<input type="text" id="ship-obs" placeholder="Observação (ex: ETA, cliente...)">

<button onclick="addShip()">+ Adicionar Navio</button>

<div id="ships-list"></div>
</div>

<div class="card">
<h3>⏰ Horários</h3>
<input type="time" id="alarm-time">
<button onclick="addTime()">+ Adicionar horário</button>

<div id="time-list"></div>
</div>

<div class="card">
<button onclick="startMonitor()">▶ Iniciar Monitoramento</button>
<button onclick="stopMonitor()">⏹ Parar Monitoramento</button>
</div>

<div class="card">
<h3>📜 Histórico</h3>
<div id="log"></div>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
