<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Monitor de Navios PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0a0f1e; --card:#111827; --border:rgba(255,255,255,0.08);
  --accent:#00d4ff; --green:#10b981; --yellow:#f59e0b;
  --red:#ef4444; --text:#e2e8f0; --muted:#64748b;
}
body{ margin:0; font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); overflow-x: hidden; }
.wrapper{ max-width:1400px; margin:auto; padding:30px; }

.dashboard{ display:flex; gap:20px; margin-bottom:20px; }
.dash-box{ flex:1; background:var(--card); padding:15px; border-radius:12px; border:1px solid var(--border); text-align:center; }

.grid{ display:grid; grid-template-columns: 1fr 1.3fr 1fr; gap:20px; }
.card{ background:var(--card); border-radius:16px; padding:20px; border:1px solid var(--border); display: flex; flex-direction: column; height: 650px; position: relative; }
.card.center{ transform:scale(1.02); border:1px solid var(--accent); }

/* --- BARRA DE SCROLL FUNCIONAL --- */
.list-scroll { 
    height: 100%; 
    overflow-y: scroll !important; 
    margin-top: 15px; 
    padding-right: 10px;
    display: block;
}

/* Customização visual do Scroll */
.list-scroll::-webkit-scrollbar { width: 8px; }
.list-scroll::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); border-radius: 10px; }
.list-scroll::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 10px; }
.list-scroll::-webkit-scrollbar-thumb:hover { background: var(--accent); }

.ship{ padding:12px; margin-bottom:10px; border-radius:10px; background:#1a2236; position:relative; border: 1px solid var(--border); }
.ship-actions{ position:absolute; right:10px; top:10px; display: flex; gap: 5px; }

.badge{ font-size:11px; padding:3px 6px; border-radius:6px; font-weight: bold; }
.badge.green{background:rgba(16,185,129,0.2);color:var(--green);}
.badge.yellow{background:rgba(245,158,11,0.2);color:var(--yellow);}
.badge.red{background:rgba(239,68,68,0.2);color:var(--red);}

input,select,button{ width:100%; margin-top:6px; padding:10px; border-radius:8px; border:none; box-sizing: border-box; font-family: inherit; }
button{ background:var(--accent); font-weight:bold; cursor:pointer; color: #000; }

.btn-danger { background: var(--red); color: white; }
.btn-small { width: auto; padding: 4px 10px; font-size: 11px; margin: 0; }

.history-list { height: 200px; overflow-y: auto; margin-top: 10px; font-size: 13px; border-top: 1px solid var(--border); }
.log-entry { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding: 8px 0; }

#toast-container{ position:fixed; bottom:20px; right:20px; z-index:9999; }
.toast{ background:#1e293b; color:white; padding:15px; border-radius:8px; border-left: 4px solid var(--accent); margin-top:10px; }
</style>
</head>
<body>
<div id="toast-container"></div>
<div class="wrapper">
<h1>🚢 Monitor de Navios</h1>

<div class="dashboard">
  <div class="dash-box" id="dash-future">Futuros: 0</div>
  <div class="dash-box" id="dash-active">Ativos: 0</div>
  <div class="dash-box" id="dash-done">Concluídos: 0</div>
</div>

<div class="grid">
  <!-- FUTUROS -->
  <div class="card">
    <h3>📅 Futuros</h3>
    <input id="future-name" placeholder="Nome">
    <input id="future-port" placeholder="Porto">
    <input id="future-obs" placeholder="Obs">
    <input type="date" id="future-date">
    <button onclick="addFutureShip()">Agendar</button>
    <div id="future-list" class="list-scroll"></div>
  </div>

  <!-- MONITORANDO -->
  <div class="card center">
    <h3>📍 Monitorando</h3>
    <input id="ship-name" placeholder="Nome">
    <input id="ship-port" placeholder="Porto">
    <input id="ship-obs" placeholder="Obs">
    <button onclick="addShip()">Adicionar</button>
    <div id="ships-list" class="list-scroll"></div>
  </div>

  <!-- CONCLUÍDOS -->
  <div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h3>✅ Concluídos</h3>
        <button class="btn-danger btn-small" onclick="clearAllDone()">Limpar Todos</button>
    </div>
    <div id="ships-done" class="list-scroll"></div>
  </div>

  <!-- HISTÓRICO -->
  <div class="card" style="grid-column: span 3; margin-top: 20px; height: auto;">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h3>📜 Histórico de Atividades</h3>
        <button class="btn-danger btn-small" onclick="clearFullHistory()">Limpar Histórico</button>
    </div>
    <div id="history-list" class="history-list"></div>
  </div>
</div>

<div class="card" style="height: auto; margin-top: 20px;">
  <div style="display: flex; gap: 15px; align-items: flex-end;">
    <div style="flex: 1;"><small>Frequência:</small>
      <select id="freq-select" onchange="setFrequency(this.value)">
        <option value="1">1 min</option><option value="60">1 hora</option><option value="1440" selected>1x ao dia</option>
      </select>
    </div>
    <div style="flex: 1;"><small>Hora Fixa:</small><input type="time" id="fixed-time" value="09:00"></div>
    <div style="flex: 2; display: flex; gap: 10px;">
      <button onclick="startMonitor()">▶ Iniciar</button>
      <button style="background: var(--muted); color: #fff;" onclick="stopMonitor()">⏹ Parar</button>
    </div>
  </div>
</div>
</div>
<script src="script.js"></script>
</body>
</html>
