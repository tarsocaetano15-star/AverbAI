<!-- ATIVOS -->
<div class="card center">
<h3>📍 Monitorando</h3>

<input id="shipName" placeholder="Nome">
<input id="shipPort" placeholder="Porto">
<input id="shipObs" placeholder="Obs">

<button onclick="addShip()">Adicionar</button>

<div id="ships-list"></div>
</div>

<!-- FUTUROS -->
<div class="card">
<h3>📅 Futuros</h3>

<input id="futureName" placeholder="Nome">
<input id="futurePort" placeholder="Porto">
<input id="futureObs" placeholder="Obs">
<input type="date" id="futureDate">

<button onclick="addFutureShip()">Agendar</button>

<div id="future-list"></div>
</div>
